# Configuration de l'application
spring.application.name=bibliotheque-idf

# Configuration du profil actif
spring.profiles.active=dev

# Configuration du serveur
server.port=8080

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true\
  # Configuration JWT
jwt.secret=bibliothequeIdfSecretKeyForJWTTokenGenerationAndValidation2024
jwt.expiration=86400000

# Configuration de la base de données H2 (développement)
spring.datasource.url=jdbc:h2:mem:bibliothequedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Configuration JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Console H2 (développement uniquement)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuration de la validation
spring.jpa.properties.hibernate.validator.apply_to_ddl=false

# Configuration des logs
logging.level.com.bibliotheque.idf=DEBUG
logging.level.org.springframework.security=DEBUG
