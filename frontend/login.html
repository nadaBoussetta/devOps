<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Bibliothèques IDF</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo"> Bibliothèques IDF</h1>
            <ul class="nav-links">
                <li><a href="index.html">Accueil</a></li>
                <li><a href="recherche.html">Recherche</a></li>
                <li><a href="livres.html">Livres</a></li>
                <li><a href="feed.html">Feed Social</a></li>
                <li><a href="login.html" class="active">Connexion</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <div class="auth-container">
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">Connexion</button>
                <button class="tab-btn" data-tab="register">Inscription</button>
            </div>

            <!-- Formulaire de connexion -->
            <div id="login-form" class="auth-form active">
                <h2>Connexion</h2>
                <form id="login">
                    <div class="form-group">
                        <label for="login-username">Nom d'utilisateur</label>
                        <input type="text" id="login-username" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Mot de passe</label>
                        <input type="password" id="login-password" required>
                        <button type="button" id="toggle-login-password" class="toggle-password">👁️</button>
                    </div>
                    <button type="submit" class="btn btn-primary">Se connecter</button>
                    <div id="login-message" class="message"></div>
                </form>
            </div>

            <!-- Formulaire d'inscription -->
            <div id="register-form" class="auth-form">
                <h2>Inscription</h2>
                <form id="register">
                    <div class="form-group">
                        <label for="register-username">Nom d'utilisateur</label>
                        <input type="text" id="register-username" required>
                    </div>
                    <div class="form-group">
                        <label for="register-email">Email</label>
                        <input type="email" id="register-email" required>
                    </div>
                    <div class="form-group">
                        <label for="register-password">Mot de passe</label>
                        <input type="password" id="register-password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">S'inscrire</button>
                    <div id="register-message" class="message"></div>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Bibliothèques Île-de-France. Tous droits réservés.</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
