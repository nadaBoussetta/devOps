<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bibliothèques Île-de-France</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Parisienne&display=swap" rel="stylesheet">

    <link rel="icon" href="resources/logo_pic.png" type="image/png">

</head>
<body>

<div class="header">
    <img alt="logo" id="logo_pic" src="resources/logo_pic.png" >
    <h1 id="titre">Bibliothèques d’Île‑de‑France</h1>
</div>

<div class="menu">
    <menu>
        <ul class="menu_1">
            <li><a href="index.html" >Accueil</a></li>
            <li><a href="recherche.html">Recherche</a></li>
            <li><a href="livres.html">Livres</a></li>
            <li><a href="feed.html">Feed Social</a></li>
            <li><a href="favoris.html">Mes Favoris</a></li>
            <li><a href="sessions.html">Sessions</a></li>
            <li><a href="notifications.html">Notifications</a></li>
            <li><a href="login.html" id="auth-link">Connexion</a></li>


        </ul>
    </menu>
</div>

<div class="partie_1"></div>

    <main class="container">
        <div class="auth-container">
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">Connexion</button>
                <button class="tab-btn" data-tab="register">Inscription</button>
            </div>

            <!-- Formulaire de connexion -->
            <div id="login-form" class="auth-form active">
                <h2 class="tit-s">Connexion</h2>
                <form id="login">
                    <div class="form-group">
                        <label for="login-username">Nom d'utilisateur</label>
                        <input type="text" id="login-username" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Mot de passe</label>
                        <input type="password" id="login-password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Se connecter</button>
                    <div id="login-message" class="message"></div>
                </form>
            </div>

            <!-- Formulaire d'inscription -->
            <div id="register-form" class="auth-form">
                <h2 class="tit-s">Inscription</h2>
                <form id="register">
                    <div class="form-group">
                        <label for="register-username">Nom d'utilisateur</label>
                        <input type="text" id="register-username" required>
                    </div>
                    <div class="form-group">
                        <label for="register-email">Email</label>
                        <input type="email" id="register-email" required>
                    </div>
                    <div class="form-group">
                        <label for="register-password">Mot de passe</label>
                        <input type="password" id="register-password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">S'inscrire</button>
                    <div id="register-message" class="message"></div>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 Bibliothèques Île-de-France. Tous droits réservés.</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
